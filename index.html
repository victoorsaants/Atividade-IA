<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Turista AI - Seu Guia Inteligente</title>
    <link rel="icon" href="/static/favicon.png">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>

    <!-- Decorative background blobs -->
    <div class="page-bg" aria-hidden="true">
        <div class="bg-blob blob-1"></div>
        <div class="bg-blob blob-2"></div>
    </div>

    <!-- Phone mockup -->
    <div class="phone-mockup">
        <div class="phone-body">

            <!-- Side buttons (decorative) -->
            <div class="phone-btn volume-up"  aria-hidden="true"></div>
            <div class="phone-btn volume-down" aria-hidden="true"></div>
            <div class="phone-btn power"       aria-hidden="true"></div>

            <!-- Phone screen -->
            <div class="phone-screen">

                <!-- Status bar -->
                <div class="phone-status-bar" aria-hidden="true">
                    <span class="status-time">9:41</span>
                    <div class="dynamic-island"></div>
                    <div class="status-icons">
                        <!-- Wi-Fi -->
                        <svg width="15" height="12" viewBox="0 0 24 24" fill="white" aria-hidden="true">
                            <path d="M1 9l2 2c5.07-5.07 11.68-7.16 17.65-6.19L23 2.76C15.73 1.05 7.55 3.43 1 9zm8 8l3 3 3-3c-1.65-1.65-4.35-1.65-6 0zm-4-4l2 2c2.77-2.77 6.51-4.11 10.14-4.05L19 9c-4.64-.43-9.36 1.29-12.98 4.97L5 13z"/>
                        </svg>
                        <!-- Battery -->
                        <svg width="22" height="12" viewBox="0 0 26 14" fill="white" aria-hidden="true">
                            <rect x="0.5" y="0.5" width="22" height="13" rx="3" stroke="white" stroke-opacity="0.45" fill="none" stroke-width="1"/>
                            <rect x="23" y="4.5" width="2.5" height="5" rx="1" fill="white" opacity="0.4"/>
                            <rect x="2" y="2" width="16" height="10" rx="2" fill="white"/>
                        </svg>
                    </div>
                </div>

                <!-- Chat app -->
                <div class="app-container">

                    <header class="app-header">
                        <div class="logo-area">
                            <div class="logo-icon">🌍</div>
                            <h1>Turista AI</h1>
                        </div>
                        <div class="status-indicator remote" id="status-indicator">
                            <span class="dot"></span>
                            <span id="status-label">Conectando</span>
                        </div>
                    </header>

                    <main class="chat-area" id="chat-messages">
                        <div class="message ai-message">
                            <div class="message-content" id="welcome-message">
                                Carregando a base turística do projeto...
                            </div>
                            <div class="message-time">Agora</div>
                        </div>
                    </main>

                    <div class="suggestions" id="suggestions"></div>

                    <footer class="input-area">
                        <form id="chat-form">
                            <input
                                type="text"
                                id="user-input"
                                placeholder="Pergunte sobre um destino..."
                                autocomplete="off"
                            >
                            <button type="submit" id="send-btn" aria-label="Enviar mensagem">
                                <svg viewBox="0 0 24 24" width="18" height="18">
                                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                                </svg>
                            </button>
                        </form>
                    </footer>

                </div>

                <!-- Home indicator -->
                <div class="home-indicator" aria-hidden="true"></div>

            </div>
        </div>
    </div>

    <script src="/static/script.js"></script>
</body>
</html>
